<style>
  :root{ --green:#1FA85C; --green-soft:#37C98C; --accent:#E25822; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  html,body{margin:0;height:100%;background:#0b1411;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;overflow:hidden}
  #bar{position:fixed;top:0;left:0;right:0;z-index:30;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;background:linear-gradient(180deg,rgba(0,0,0,.7),rgba(0,0,0,.32) 72%,transparent);pointer-events:none}

  .chip{flex:none;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.34);color:#fff;font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .chip[aria-pressed="true"]{background:var(--green);border-color:transparent}
  #feed{height:100vh;height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;overscroll-behavior-y:contain;scrollbar-width:none;-webkit-overflow-scrolling:touch}

  .slide{position:relative;height:100vh;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden}
  .bg{position:absolute;inset:0;z-index:0;background:radial-gradient(130% 95% at 50% 22%,#15281e 0%,#0b1411 55%,#070d0a 100%)}

  .spin{position:absolute;inset:0;z-index:4;display:grid;place-items:center;pointer-events:none}

  .spin[hidden]{display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .cue{position:absolute;inset:0;z-index:5;border:0;padding:0;cursor:pointer;background:#000;display:block;width:100%;height:100%}
  .cue[hidden]{display:none}

  #homeSearch{width:100%;max-width:520px;margin:0 auto 14px;display:block;padding:13px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:#fff;font-size:15px;outline:none}

  .hm-sec{max-width:520px;margin:0 auto 10px;font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}
  .hm-trend{max-width:520px;margin:0 auto 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .tcard{border:0;padding:0;border-radius:12px;overflow:hidden;cursor:pointer;background:#0e1b15;position:relative;aspect-ratio:9/13}
  .tcard img{width:100%;height:100%;object-fit:cover;display:block}
  .tcard span{position:absolute;left:0;right:0;bottom:0;padding:14px 7px 6px;font-size:10px;line-height:1.3;text-align:left;color:#fff;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hm-grid{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .hm-cat{padding:16px;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(255,255,255,.07);color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:left}
  @media(min-width:600px){ .hm-grid{grid-template-columns:repeat(3,1fr)} .hm-trend{grid-template-columns:repeat(6,1fr)} }
  #searchRow{max-width:760px;margin:8px auto 0;pointer-events:auto} #searchRow[hidden]{display:none}
  #searchRow input{width:100%;padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.55);color:#fff;font-size:14px;outline:none}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>
</head>

<script>
const LOGO='<svg viewBox="0 0 120 120"><g fill="none" stroke="#1FA85C" stroke-width="6" stroke-linecap="round"><line x1="60" y1="44" x2="42" y2="20"/><line x1="60" y1="44" x2="80" y2="22"/></g><circle cx="42" cy="18" r="5.5" fill="#1FA85C"/><circle cx="82" cy="20" r="5.5" fill="#1FA85C"/><rect x="16" y="44" width="88" height="62" rx="16" fill="#fff" stroke="#1FA85C" stroke-width="9"/><text x="60" y="90" text-anchor="middle" font-family="Arial" font-weight="800" font-size="46" fill="#1FA85C">LC</text></svg>';
const SVG_HEART='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>';
const SVG_SHARE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>';
const SVG_SND='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>';
const FEED=document.getElementById('feed'), CHIPS=document.getElementById('chips'), HOME=document.getElementById('home');
const IOS=/iP(hone|od|ad)/.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/.test(navigator.userAgent));
let ALL=[], list=[], activeFilter='all', searchQ='', activeSlide=null, activeTimer=null;
let saved={}; try{ saved=JSON.parse(localStorage.getItem('hot_saved')||'{}'); }catch(e){}
function isSaved(id){return !!saved[id];}
function toggleSaved(id){ if(saved[id])delete saved[id]; else saved[id]=1; try{localStorage.setItem('hot_saved',JSON.stringify(saved));}catch(e){} }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtV(v){ v=+v||0; return v>=10000?(v/10000).toFixed(1)+'만':v>=1000?(v/1000).toFixed(1)+'천':String(v); }
function ytThumbFb(img){ const id=img.dataset.id, s=img.dataset.s||'max'; if(s==='max'){img.dataset.s='sd';img.src='https://i.ytimg.com/vi/'+id+'/sddefault.jpg';} else if(s==='sd'){img.dataset.s='hq';img.src='https://i.ytimg.com/vi/'+id+'/hqdefault.jpg';} }
window.ytThumbFb=ytThumbFb;
function computeList(){ let a=ALL.filter(g=>g.youtubeId);
  if(activeFilter==='search'){ const q=(searchQ||'').trim().toLowerCase(); if(q) a=a.filter(g=>((g.title+' '+g.match+' '+g.channel).toLowerCase().includes(q))); }
  else if(activeFilter==='saved'){ a=a.filter(g=>isSaved(g.youtubeId)); }
  else if(activeFilter==='latest'){ const cut=Date.now()-3*86400000; a=a.filter(g=>(Date.parse(g.published)||0)>=cut).sort((x,y)=>(Date.parse(y.published)||0)-(Date.parse(x.published)||0)); }
  else if(activeFilter==='kor'){ a=a.filter(g=>(g.tags||[]).includes('kor')); }
  else if(activeFilter!=='all'){ a=a.filter(g=>g.league===activeFilter); }
  return a; }
function slideHTML(g){ const id=g.youtubeId, vw=g.views?('<span class="vw">조회 '+fmtV(g.views)+'</span>'):'';
  return '<section class="slide" data-id="'+id+'">'
    + '<div class="bg"></div>'
    + '<div class="stage"><div class="mount"></div><div class="spin" hidden></div>'
    +   '<button class="cue" aria-label="'+esc(g.title)+' 재생"><img class="thumb" loading="lazy" data-id="'+id+'" src="https://i.ytimg.com/vi/'+id+'/maxresdefault.jpg" onerror="ytThumbFb(this)" alt=""><span class="scrim">'+LOGO+'<b>재생</b></span></button>'
    +   '<button class="sndpill" hidden>'+SVG_SND+'소리 켜기</button></div>'
    + '<div class="acts"><button class="act like'+(isSaved(id)?' on':'')+'" data-id="'+id+'" aria-label="관심 저장">'+SVG_HEART+'<span class="cnt">관심</span></button>'
    +   '<button class="act share" data-id="'+id+'" data-title="'+esc(g.title)+'" aria-label="공유">'+SVG_SHARE+'<span class="cnt">공유</span></button></div>'
    + '<div class="cap"><span class="lg">'+esc(g.match)+'</span>'+vw+'<div class="ttl">'+esc(g.title)+'</div><span class="ch">'+esc(g.channel)+'</span></div>'
    + '</section>'; }
function endHTML(){ return '<section class="endcard"><div>'+LOGO+'</div><b>여기까지 다 보셨어요</b><p>처음부터 다시 보거나 다른 종목을 골라보세요</p><div><button class="eb pri" id="endTop">맨 위로</button><button class="eb" id="endHome">다른 종목 보기</button></div></section>'; }
function buildFeed(){ FEED.querySelectorAll('.mount').forEach(m=>m.innerHTML=''); activeSlide=null; list=computeList();
  document.getElementById('empty').classList.toggle('show', list.length===0);
  FEED.innerHTML=list.map(slideHTML).join('') + (list.length?endHTML():''); FEED.scrollTop=0;
  FEED.querySelectorAll('.slide').forEach(s=>io.observe(s));
  if(list.length){ const f0=FEED.querySelector('.slide'); if(f0) setActive(f0); }   // 초기 슬라이드 자동재생 보장(IO 첫콜백 비율0 이슈 보완)
  const et=document.getElementById('endTop'); if(et)et.onclick=()=>FEED.scrollTo({top:0,behavior:'smooth'});
  const eh=document.getElementById('endHome'); if(eh)eh.onclick=showHome; }
/* 재생 (라이트 임베드: API 없음) */
function play(slide, muted){ const id=slide.dataset.id, host=slide.querySelector('.mount'); if(!host)return;
  host.innerHTML='';
  const spin=slide.querySelector('.spin'); if(spin)spin.hidden=false;
  const ifr=document.createElement('iframe');
  ifr.allow='autoplay; encrypted-media; picture-in-picture; fullscreen'; ifr.setAttribute('allowfullscreen',''); ifr.setAttribute('playsinline','1');
  ifr.src='https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1&rel=0&modestbranding=1'+(muted?'&mute=1':'');
  ifr.addEventListener('load',()=>{ if(spin)spin.hidden=true; });
  host.appendChild(ifr);
  slide.querySelector('.cue').hidden=true;
  const pill=slide.querySelector('.sndpill'); if(pill)pill.hidden=!muted; }
function teardown(slide){ const h=slide.querySelector('.mount'); if(h)h.innerHTML='';
  const c=slide.querySelector('.cue'); if(c)c.hidden=false;
  const p=slide.querySelector('.sndpill'); if(p)p.hidden=true;
  const s=slide.querySelector('.spin'); if(s)s.hidden=true; }
/* 활성 슬라이드 추적: 비iOS는 무음 자동재생, iOS는 포스터(탭 재생) */
const io=new IntersectionObserver(es=>{ es.forEach(e=>{
    if(!e.target.classList.contains('slide')) return;
    if(e.isIntersecting && e.intersectionRatio>=0.6){ setActive(e.target); }
    else if(!e.isIntersecting){ teardown(e.target); }
  }); },{root:FEED,threshold:[0,0.6,1]});
function setActive(slide){ if(slide===activeSlide)return; activeSlide=slide; clearTimeout(activeTimer);
  if(!IOS){ activeTimer=setTimeout(()=>{ if(activeSlide===slide && !slide.querySelector('.mount').firstChild) play(slide,true); },180); } }
/* 피드 클릭 */
FEED.addEventListener('click',e=>{
  const pill=e.target.closest('.sndpill'); if(pill){ play(pill.closest('.slide'),false); return; }
  const cue=e.target.closest('.cue'); if(cue){ play(cue.closest('.slide'),false); return; }
  const lk=e.target.closest('.act.like'); if(lk){ const id=lk.dataset.id; toggleSaved(id); lk.classList.toggle('on',isSaved(id)); return; }
  const sh=e.target.closest('.act.share'); if(sh){ shareVideo(sh.dataset.id, sh.dataset.title); return; }
  const tt=e.target.closest('.cap .ttl'); if(tt){ tt.classList.toggle('expanded'); } });
function shareVideo(id,title){ const url='https://youtu.be/'+id;
  if(navigator.share){ navigator.share({title:title||'스포츠 쇼츠',url}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>toast('링크를 복사했어요')); }
  else { toast(url); } }
let toastT=null;
function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:99;background:rgba(0,0,0,.82);color:#fff;font-size:13px;font-weight:700;padding:10px 16px;border-radius:999px;pointer-events:none;transition:opacity .25s'; document.body.appendChild(t);} t.textContent=msg; t.style.opacity='1'; clearTimeout(toastT); toastT=setTimeout(()=>t.style.opacity='0',1800); }
/* 탭 */
CHIPS.addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return; CHIPS.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed','false')); c.setAttribute('aria-pressed','true'); activeFilter=c.dataset.filter; buildFeed(); });
function updateChips(){ const cnt={}; ALL.forEach(g=>{ cnt[g.league]=(cnt[g.league]||0)+1; if((g.tags||[]).includes('kor'))cnt._kor=(cnt._kor||0)+1; });
  CHIPS.querySelectorAll('.chip').forEach(c=>{ const f=c.dataset.filter; if(f==='all'||f==='latest'||f==='saved'){c.style.display='';return;} const n=f==='kor'?(cnt._kor||0):(cnt[f]||0); c.style.display=n>=(f==='kor'?1:2)?'':'none'; }); }
/* 검색 */
const searchBtn=document.getElementById('searchBtn'), searchRow=document.getElementById('searchRow'), searchInput=document.getElementById('searchInput');
searchBtn.addEventListener('click',()=>{ const wasHidden=searchRow.hidden; searchRow.hidden=!wasHidden; if(wasHidden){ searchInput.focus(); } else { searchInput.value=''; searchQ=''; if(activeFilter==='search'){ activeFilter='all'; CHIPS.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed', x.dataset.filter==='all'?'true':'false')); buildFeed(); } } });
searchInput.addEventListener('input',()=>{ searchQ=searchInput.value; activeFilter='search'; CHIPS.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed','false')); buildFeed(); });
/* 홈 */
function showHome(){ FEED.querySelectorAll('.mount').forEach(m=>m.innerHTML=''); activeSlide=null; HOME.hidden=false; HOME.scrollTop=0; }
function openFeed(filter){ HOME.hidden=true; activeFilter=filter||'all'; CHIPS.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed', x.dataset.filter===activeFilter?'true':'false')); buildFeed(); }
function openAt(id){ HOME.hidden=true; activeFilter='all'; CHIPS.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed', x.dataset.filter==='all'?'true':'false')); buildFeed(); requestAnimationFrame(()=>{ const s=[...FEED.querySelectorAll('.slide')].find(x=>x.dataset.id===id); if(s)s.scrollIntoView(); }); }
const brand=document.querySelector('.brand');
brand.addEventListener('click',showHome); brand.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();showHome();} });
HOME.querySelectorAll('.hm-cat,.hm-cta').forEach(b=>b.addEventListener('click',()=>openFeed(b.dataset.filter)));
document.getElementById('hmTrend').addEventListener('click',e=>{ const c=e.target.closest('.tcard'); if(c)openAt(c.dataset.id); });
const homeSearch=document.getElementById('homeSearch');
homeSearch.addEventListener('keydown',e=>{ if(e.key==='Enter'){ searchQ=homeSearch.value; HOME.hidden=true; activeFilter='search'; CHIPS.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed','false')); buildFeed(); } });
function buildTrending(){ const top=[...ALL].filter(g=>g.youtubeId).sort((a,b)=>((b.short?1:0)-(a.short?1:0))||((b.views||0)-(a.views||0))).slice(0,6);
  if(!top.length)return; const el=document.getElementById('hmTrend');
  el.innerHTML=top.map(g=>'<button class="tcard" data-id="'+g.youtubeId+'"><img loading="lazy" data-id="'+g.youtubeId+'" src="https://i.ytimg.com/vi/'+g.youtubeId+'/hqdefault.jpg" alt=""><span>'+esc(g.title)+'</span></button>').join('');
  el.hidden=false; document.getElementById('trendSec').hidden=false; }
/* 이동/키보드 */
function goNext(){ FEED.scrollBy({top:FEED.clientHeight,behavior:'smooth'}); }
function goPrev(){ FEED.scrollBy({top:-FEED.clientHeight,behavior:'smooth'}); }
document.getElementById('navUp').addEventListener('click',goPrev);
document.getElementById('navDn').addEventListener('click',goNext);
document.addEventListener('keydown',e=>{ if(HOME.hidden===false)return; if(e.key==='ArrowDown'||e.key==='PageDown'){e.preventDefault();goNext();} else if(e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();goPrev();} });
/* 새로고침/설치 */
document.getElementById('reloadBtn').addEventListener('click',()=>{ location.href=location.pathname+'?r='+Date.now(); });
let deferred=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferred=e; document.getElementById('installBtn').hidden=false; });
document.getElementById('installBtn').addEventListener('click',async()=>{ if(!deferred)return; deferred.prompt(); await deferred.userChoice; deferred=null; document.getElementById('installBtn').hidden=true; });
document.getElementById('errRetry').addEventListener('click',load);
/* 로드 */
async function load(){ document.getElementById('err').classList.remove('show');
  try{ const r=await fetch('data.json?_='+Date.now()); if(!r.ok)throw 0; ALL=(await r.json())||[]; }
  catch(e){ ALL=[]; document.getElementById('err').classList.add('show'); }
  updateChips(); buildTrending(); buildFeed(); }
load();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
