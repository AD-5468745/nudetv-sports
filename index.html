<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>누드TV 스포츠 · 골·하이라이트</title>
<meta name="theme-color" content="#EAF5F1" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="누드TV" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#EFF7F3;
    --surface:#FFFFFF;
    --green:#2FA98C;        /* 진한 브랜드 그린 (텍스트/포인트) */
    --green-soft:#82C9B7;   /* 로고 민트 (타일/채움) */
    --orange:#C2451A;       /* 번트오렌지 (포인트) */
    --orange-br:#E1591F;    /* 골 스탬프용 밝은 오렌지 */
    --ink:#16302A;          /* 본문 글자 (딥 틸-차콜) */
    --muted:#6E837C;        /* 캡션 */
    --line:rgba(22,48,42,.10);
    --card-ink:#0E1A17;     /* 카드 내부 어두운 영상 톤 */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink)}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    line-height:1.45;min-height:100dvh;overflow-x:hidden;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .stamp{font-family:"Bebas Neue",sans-serif;letter-spacing:.5px}

  /* 배너 느낌: 연민트 필드 + 우상단 오렌지 스워시 */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      linear-gradient(180deg,#FFFFFF 0%,#EAF5F1 40%,#EFF7F3 100%),
      radial-gradient(60% 30% at 100% 0%, rgba(194,69,26,.10), transparent 60%);
  }
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 14px 64px}

  /* ---------- header ---------- */
  header{padding:18px 2px 12px;display:flex;align-items:center;gap:12px;position:relative}
  header::before{ /* 배너의 오렌지 라인 오마주 */
    content:"";position:absolute;top:6px;right:2px;width:64px;height:3px;border-radius:3px;
    background:linear-gradient(90deg,transparent,var(--orange));
  }
  .mascot{
    width:54px;height:54px;flex:none;object-fit:contain;
    background:radial-gradient(circle at 50% 45%, rgba(130,201,183,.35), transparent 70%);
    filter:drop-shadow(0 4px 8px rgba(47,169,140,.25));
  }
  .brand{display:flex;flex-direction:column;gap:1px;min-width:0}
  .brand .eyebrow{font-size:11px;letter-spacing:2.5px;color:var(--green);font-weight:800;text-transform:uppercase}
  .brand h1{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--ink)}
  .brand h1 b{color:var(--orange)}
  .install{
    margin-left:auto;flex:none;border:1px solid var(--line);background:var(--surface);
    color:var(--green);font-size:12.5px;font-weight:800;padding:9px 13px;border-radius:999px;cursor:pointer;
    box-shadow:0 2px 8px rgba(22,48,42,.05);
  }
  .install:active{transform:scale(.96)}
  .install[hidden]{display:none}

  .status{display:flex;align-items:center;gap:8px;margin:4px 2px 16px;font-size:13px;color:var(--muted)}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--orange-br);box-shadow:0 0 0 0 rgba(225,89,31,.5);animation:pulse 1.8s infinite}
  .status b{color:var(--ink);font-weight:800}
  @keyframes pulse{70%{box-shadow:0 0 0 8px rgba(225,89,31,0)}100%{box-shadow:0 0 0 0 rgba(225,89,31,0)}}

  /* ---------- chips ---------- */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 18px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none;border:1px solid var(--line);background:var(--surface);color:var(--muted);
    font-size:13px;font-weight:700;padding:9px 15px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.16s;
    box-shadow:0 1px 4px rgba(22,48,42,.04);
  }
  .chip[aria-pressed="true"]{background:var(--green);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(47,169,140,.3)}
  .chip.big[aria-pressed="true"]{background:var(--orange);box-shadow:0 4px 12px rgba(194,69,26,.3)}

  /* ---------- grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}

  .card{
    position:relative;aspect-ratio:9/16;border-radius:18px;overflow:hidden;cursor:pointer;
    background:var(--card-ink);border:1px solid var(--line);isolation:isolate;
    box-shadow:0 6px 18px rgba(22,48,42,.10);transition:transform .18s, box-shadow .18s;
  }
  .card:active{transform:scale(.975)}
  @media(hover:hover){.card:hover{transform:translateY(-3px);box-shadow:0 16px 30px rgba(22,48,42,.18)}}

  .thumb{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(120% 75% at 28% 0%, rgba(130,201,183,.30), transparent 55%),
      linear-gradient(180deg,#16302A,#0B1714);
  }
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
  .thumb img.on{opacity:1}
  .card .scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,.05) 32%,rgba(0,0,0,.74) 100%)}

  .minute{position:absolute;top:9px;left:11px;z-index:2;font-family:"Bebas Neue",sans-serif;font-size:32px;line-height:.8;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.55)}
  .minute span{font-size:16px;color:var(--orange-br)}
  .src{position:absolute;top:12px;right:10px;z-index:2;font-size:10px;font-weight:800;letter-spacing:.4px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);padding:4px 7px;border-radius:7px;color:#fff}
  .kor-flag{position:absolute;top:44px;right:10px;z-index:2;font-size:16px}
  .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;width:46px;height:46px;border-radius:50%;background:rgba(194,69,26,.85);display:grid;place-items:center;box-shadow:0 4px 16px rgba(194,69,26,.5)}
  .play svg{width:18px;height:18px;margin-left:2px;fill:#fff}
  .meta{position:absolute;left:11px;right:11px;bottom:11px;z-index:2}
  .meta .match{font-size:11px;font-weight:800;color:var(--green-soft);margin-bottom:2px}
  .meta .ttl{font-size:13.5px;font-weight:700;letter-spacing:-.2px;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta .ago{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}

  .empty{grid-column:1/-1;text-align:center;padding:54px 18px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);background:var(--surface)}
  .empty .em-ico{font-size:34px;margin-bottom:10px}
  .empty b{display:block;color:var(--ink);font-size:15px;font-weight:800;margin-bottom:4px}

  footer{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);line-height:1.7}
  footer b{color:var(--ink)}

  /* ---------- player ---------- */
  .player{position:fixed;inset:0;z-index:50;background:rgba(8,18,15,.97);display:none}
  .player.open{display:block}
  .player-inner{position:absolute;inset:0;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .pbar{display:flex;align-items:center;gap:10px;padding:14px 16px;color:#fff}
  .pbar .pttl{font-size:14px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pbar .psrc{font-size:11px;color:var(--green-soft);font-weight:800;flex:none}
  .close{margin-left:auto;flex:none;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#fff;font-size:18px;cursor:pointer}
  .stage{flex:1;display:grid;place-items:center;padding:0 10px}
  .frame{position:relative;width:100%;max-width:min(420px,calc((100dvh - 200px) * 9 / 16));aspect-ratio:9/16;border-radius:18px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.12)}
  .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .frame .blocked{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;background:#11201C;color:#fff}
  .frame .blocked.on{display:flex}
  .frame .blocked .b-ico{font-size:32px}
  .frame .blocked p{font-size:13px;color:rgba(255,255,255,.65);line-height:1.6}
  .frame .blocked a{display:inline-block;background:var(--orange);color:#fff;font-weight:800;font-size:13px;padding:11px 18px;border-radius:999px;text-decoration:none}
  .pnav{display:flex;justify-content:space-between;gap:12px;padding:14px 18px}
  .pnav button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);color:#fff;font-size:13px;font-weight:700;padding:11px 16px;border-radius:999px;cursor:pointer;flex:1;max-width:160px}
  .pnav button:disabled{opacity:.32}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--orange);outline-offset:2px}
</style>
</head>

          <p>이 영상은 퍼가기가 막혀 있어요.<br />공식 채널에서 바로 볼 수 있습니다.</p>
          <a id="pFallback" href="#" target="_blank" rel="noopener">공식 채널에서 보기</a>
        </div>
      </div>
    </div>
    <div class="pnav">
      <button id="pPrev">‹ 이전 골</button>
      <button id="pNext">다음 골 ›</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   골은 자동으로 채워집니다.
   GitHub 자동작업이 30분마다 공식 채널을 읽어 data.json 을 만들고,
   이 화면은 그 data.json 을 읽어 카드로 보여줍니다. 손볼 것 없습니다.
   (data.json 이 아직 없으면 아래 데모 화면이 보입니다)
   ============================================================ */
const DEMO = [
  { league:"worldcup", match:"대한민국 vs 체코",        title:"이강인 환상 프리킥 결승골", youtubeId:"", channel:"KBS",  tags:["kor"], note:"데모" },
  { league:"epl",      match:"Arsenal vs Chelsea",     title:"사카 원더골 하이라이트",     youtubeId:"", channel:"EPL",  tags:[],      note:"데모" },
  { league:"mlb",      match:"Dodgers vs Padres",      title:"오타니 끝내기 홈런",         youtubeId:"", channel:"MLB",  tags:[],      note:"데모" },
  { league:"nba",      match:"Lakers vs Celtics",      title:"르브론 버저비터",            youtubeId:"", channel:"NBA",  tags:[],      note:"데모" },
  { league:"epl",      match:"Tottenham vs Liverpool", title:"손흥민 멀티골 폭발",         youtubeId:"", channel:"EPL",  tags:["kor"], note:"데모" },
  { league:"mlb",      match:"Padres vs Giants",       title:"김하성 환상 호수비",         youtubeId:"", channel:"MLB",  tags:["kor"], note:"데모" },
];

const grid = document.getElementById('grid');
let activeFilter = 'all';
let goals = DEMO;          // 화면에 보이는(재생 가능 확인된) 목록
let rawGoals = DEMO;       // 수집된 원본 목록
let view = [];
let mode = 'demo';
let probing = 0;                 // 남은 임베드 검사 개수
const okIds = new Set();         // 재생 확인된 영상 id

/* 임베드 검사 결과 캐시 (다음 방문 빠르게) */
const EMBED_KEY='nudetv_embed_v2', EMBED_TTL=7*24*3600*1000;
let embedCache={}; try{embedCache=JSON.parse(localStorage.getItem(EMBED_KEY)||'{}');}catch(e){}
function embedSave(){ try{localStorage.setItem(EMBED_KEY,JSON.stringify(embedCache));}catch(e){} }
function embedGet(id){ const c=embedCache[id]; return (c && (Date.now()-c.ts)<EMBED_TTL) ? c.ok : null; }

/* 화면 밖 숨은 칸에서 영상을 몰래 띄워 임베드 되는지 검사 */
const probeHost=document.createElement('div');
probeHost.setAttribute('aria-hidden','true');
probeHost.style.cssText='position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none';
document.addEventListener('DOMContentLoaded',()=>document.body.appendChild(probeHost));

function probeOne(id){
  return new Promise(resolve=>{
    const cached=embedGet(id);
    if(cached!==null){ resolve(cached); return; }
    const div=document.createElement('div'); probeHost.appendChild(div);
    let done=false, pl=null;
    const finish=(ok,cache)=>{ if(done)return; done=true;
      if(cache){ embedCache[id]={ok,ts:Date.now()}; embedSave(); }
      try{pl&&pl.destroy();}catch(e){} try{probeHost.removeChild(div);}catch(e){}
      resolve(ok); };
    try{
      pl=new YT.Player(div,{ videoId:id, width:'160', height:'90',
        playerVars:{autoplay:1,mute:1,playsinline:1,rel:0},
        events:{
          // 막힘(150/101/100 등) → 숨김 / 실제 재생 시작(버퍼링·재생) → 통과
          onError:()=>finish(false,true),
          onStateChange:(e)=>{ if(e.data===1||e.data===3) finish(true,true); },
          onReady:(e)=>{ try{ e.target.mute(); e.target.playVideo(); }catch(_){} }
        } });
    }catch(e){ finish(false,false); }
    setTimeout(()=>finish(false,false), 7000);   // 끝내 재생 안 되면 숨김(캐시 안 함 → 다음에 재시도)
  });
}

let probeRenderTimer=null;
function probeRender(){ if(probeRenderTimer)return; probeRenderTimer=setTimeout(()=>{ probeRenderTimer=null; goals=rawGoals.filter(g=>okIds.has(g.youtubeId)); render(); },350); }

async function startProbe(){
  const list=rawGoals.slice();
  probing=list.length; setStatus();
  // 유튜브 재생기 준비 대기(최대 8초). 끝내 안 뜨면 그냥 다 보여줌.
  await Promise.race([ new Promise(r=>whenYTReady(r)), new Promise(r=>setTimeout(r,8000)) ]);
  if(!ytApiReady){ probing=0; goals=rawGoals.slice(); render(); setStatus(); return; }
  const CONC=5; let idx=0;
  async function worker(){
    while(idx<list.length){
      const g=list[idx++];
      const ok=await probeOne(g.youtubeId);
      if(ok) okIds.add(g.youtubeId);
      probing--; probeRender(); setStatus();
    }
  }
  await Promise.all(Array.from({length:CONC},()=>worker()));
  probing=0; goals=rawGoals.filter(g=>okIds.has(g.youtubeId)); render(); setStatus();
}

function thumbUrl(id){ return id ? `https://i.ytimg.com/vi/${id}/hqdefault.jpg` : ''; }
function visible(){
  return goals.filter(g=>{
    if(activeFilter==='all') return true;
    if(activeFilter==='kor') return (g.tags||[]).includes('kor');
    return g.league===activeFilter;
  });
}

function ago(iso){
  const t=new Date(iso).getTime(); if(isNaN(t)) return '';
  const m=Math.floor((Date.now()-t)/60000);
  if(m<1) return '방금'; if(m<60) return m+'분 전';
  const h=Math.floor(m/60); if(h<24) return h+'시간 전';
  return Math.floor(h/24)+'일 전';
}
function setStatus(){
  const el=document.getElementById('goalCount');
  if(mode==='loading'){ el.textContent='불러오는 중…'; return; }
  if(probing>0){ el.textContent = goals.length + '  · 재생 가능 확인 중…'; return; }
  el.textContent = goals.length + (mode==='demo'?'  · 데모 화면':'');
}
async function loadData(){
  mode='loading'; setStatus();
  try{
    const res=await fetch('data.json?_=' + Date.now());   // 캐시 방지
    if(!res.ok) throw 0;
    const data=await res.json();
    goals=(data||[]).map(d=>({
      league: d.league || '',
      match: d.match || '경기',
      title: d.title || '하이라이트',
      youtubeId: d.youtubeId || '',
      channel: d.channel || '',
      tags: d.tags || [],
      note: d.published ? ago(d.published) : (d.note||'')
    })).filter(g=>g.youtubeId);
    rawGoals=goals.filter(g=>embedGet(g.youtubeId)!==false); goals=rawGoals.slice(); mode='live'; render();
  }catch(e){
    goals=DEMO; rawGoals=DEMO; mode='demo'; render();   // data.json 없으면(미리보기 등) 데모 표시
  }
}

function render(){
  view = visible();
  if(mode!=='error') setStatus();
  if(view.length===0){
    grid.innerHTML = probing>0
      ? `<div class="empty"><div class="em-ico">⏳</div><b>재생 가능한 영상 확인 중…</b>막힌 영상은 빼고 보여드릴게요.</div>`
      : `<div class="empty"><div class="em-ico">🦊</div><b>아직 골이 없어요</b>경기가 시작되면 골 장면이 여기에 올라옵니다.</div>`;
    return;
  }
  grid.innerHTML = view.map((g,i)=>{
    const isKor = g.tags.includes('kor');
    const t = thumbUrl(g.youtubeId);
    return `
    <article class="card" data-i="${i}" tabindex="0" role="button" aria-label="${g.match} ${g.title} 재생">
      <div class="thumb">${t?`<img src="${t}" alt="" loading="lazy" onload="this.classList.add('on')" onerror="this.remove()">`:''}</div>
      <div class="scrim"></div>
      ${g.minute?`<div class="minute stamp">${g.minute.replace("'","")}<span>'</span></div>`:''}
      ${g.channel?`<div class="src">${g.channel}</div>`:''}
      ${isKor?`<div class="kor-flag" aria-hidden="true">🇰🇷</div>`:''}
      <div class="play" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="meta">
        <div class="match">${g.match}</div>
        <div class="ttl">${g.title}</div>
        ${g.note?`<div class="ago">${g.note}</div>`:''}
      </div>
    </article>`;
  }).join('');
}

document.getElementById('chips').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(!c) return;
  document.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed','false'));
  c.setAttribute('aria-pressed','true');
  activeFilter = c.dataset.filter; render();
});

const player = document.getElementById('player');
const pMount = document.getElementById('pMount');
const pBlocked = document.getElementById('pBlocked');
let pIndex = 0;

/* 유튜브 공식 재생기(IFrame API): 퍼가기 금지·지역차단 영상을 자동 감지해
   '공식 채널에서 보기'로 대체합니다(회원이 유튜브로 빠져나가지 않게). */
let ytApiReady = false, ytWaiters = [];
(function loadYTApi(){
  if (window.YT && window.YT.Player){ ytApiReady = true; return; }
  const sc = document.createElement('script');
  sc.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(sc);
})();
window.onYouTubeIframeAPIReady = function(){
  ytApiReady = true; ytWaiters.forEach(fn=>fn()); ytWaiters = [];
};
function whenYTReady(fn){ ytApiReady ? fn() : ytWaiters.push(fn); }

let ytPlayer = null, playToken = 0;
function destroyYTPlayer(){
  if (ytPlayer){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer = null; }
  pMount.innerHTML = '';
}
function showBlocked(msg){
  destroyYTPlayer();
  if (msg) pBlocked.querySelector('p').innerHTML = msg;
  pBlocked.classList.add('on');
}

function markBlocked(id){ embedCache[id]={ok:false,ts:Date.now()}; embedSave(); rawGoals=rawGoals.filter(g=>g.youtubeId!==id); goals=goals.filter(g=>g.youtubeId!==id); }
function markGood(id){ if(embedGet(id)!==true){ embedCache[id]={ok:true,ts:Date.now()}; embedSave(); } }
function skipToNext(idx){
  render();           // 막힌 카드 제거 반영 + view 갱신
  view = visible();
  if(view.length===0){ showBlocked('지금은 재생 가능한 영상이 없어요.<br>잠시 후 다시 확인해 주세요.'); return; }
  openPlayer(Math.min(idx, view.length-1));
}

function openPlayer(i){
  const tok = ++playToken;
  pIndex = i; const g = view[pIndex];
  document.getElementById('pTtl').textContent = `${g.match} · ${g.title}`;
  document.getElementById('pSrc').textContent = g.channel;
  document.getElementById('pFallback').href = g.youtubeId ? `https://www.youtube.com/watch?v=${g.youtubeId}` : '#';
  pBlocked.classList.remove('on');
  pBlocked.querySelector('p').innerHTML = '이 영상은 퍼가기가 막혀 있어요.<br>공식 채널에서 바로 볼 수 있습니다.';
  destroyYTPlayer();

  document.getElementById('pPrev').disabled = pIndex===0;
  document.getElementById('pNext').disabled = pIndex===view.length-1;
  player.classList.add('open'); document.body.style.overflow='hidden';

  if(!g.youtubeId){
    showBlocked('영상 연결 준비 중입니다.<br>공식 채널에서 먼저 확인할 수 있어요.');
    return;
  }

  const holder = document.createElement('div'); holder.id = 'ytmount';
  pMount.appendChild(holder);
  let started = false;
  whenYTReady(()=>{
    if (tok !== playToken) return;          // 그새 다른 영상으로 넘어갔으면 무시
    started = true;
    ytPlayer = new YT.Player('ytmount', {
      videoId: g.youtubeId,
      playerVars: { autoplay:1, playsinline:1, rel:0, modestbranding:1 },
      events: {
        // 막힘(150/101/100 등) → 자물쇠 화면 대신 자동으로 다음 영상으로 건너뜀
        onError: ()=>{ if(tok===playToken){ markBlocked(g.youtubeId); skipToNext(pIndex); } },
        onStateChange: (e)=>{ if(e.data===1||e.data===3) markGood(g.youtubeId); }
      }
    });
  });
  // 재생기 스크립트가 끝내 안 뜨면(네트워크 차단 등) 7초 뒤 대체 화면.
  setTimeout(()=>{
    if (tok === playToken && !started && !ytPlayer && player.classList.contains('open')) showBlocked();
  }, 7000);
}
function closePlayer(){ destroyYTPlayer(); player.classList.remove('open'); document.body.style.overflow=''; }
grid.addEventListener('click', e=>{ const c=e.target.closest('.card'); if(c) openPlayer(+c.dataset.i); });
grid.addEventListener('keydown', e=>{ if((e.key==='Enter'||e.key===' ')&&e.target.classList.contains('card')){e.preventDefault();openPlayer(+e.target.dataset.i);} });
document.getElementById('pClose').addEventListener('click', closePlayer);
document.getElementById('pPrev').addEventListener('click', ()=>openPlayer(pIndex-1));
document.getElementById('pNext').addEventListener('click', ()=>openPlayer(pIndex+1));
player.addEventListener('click', e=>{ if(e.target===player) closePlayer(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&player.classList.contains('open')) closePlayer(); });

let deferred;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; document.getElementById('installBtn').hidden=false; });
document.getElementById('installBtn').addEventListener('click', async()=>{ if(!deferred) return; deferred.prompt(); await deferred.userChoice; deferred=null; document.getElementById('installBtn').hidden=true; });
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }

loadData();
</script>
</body>
</html>
