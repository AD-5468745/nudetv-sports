name: 빅리그 골 자동 수집

on:
  schedule:
    - cron: "*/30 * * * *"     # 30분마다 자동 실행
  workflow_dispatch: {}          # 수동 실행 버튼(Actions 탭)

permissions:
  contents: write                # data.json 커밋용

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 골 수집 실행
        run: python collector.py

      - name: 변경분 커밋
        run: |
          git config user.name  "wc-goal-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "새 골 없음 — 커밋 생략"
          else
            git commit -m "골 업데이트 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
